apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # Labels for the Deployment object itself
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
    # The Deployment uses these to find and manage its Pods
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # Template defines the Pods that will be created
  template:
    metadata:
      # These MUST match the 'selector' labels above
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379 # servie port
    targetPort: 6379 # container port